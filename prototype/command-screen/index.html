<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>舆情指挥中枢 · OPINION COMMAND CENTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
  :root{
    /* 深空蓝青 · 科幻指挥配色 */
    --bg-abyss:#04070f;
    --bg-grad-1:#060d1b;
    --bg-grad-2:#020409;
    --panel:#0a1424;
    --panel-2:#0c1828;
    --panel-edge:#16324f;
    --grid-line:rgba(56,225,255,.05);
    --cyan:#38e1ff;
    --cyan-dim:#1c93b8;
    --blue:#4f8bff;
    --teal:#2ee6a6;
    --rose:#ff5d7a;
    --amber:#ffc24b;
    --ink:#e8f4ff;
    --ink-2:#9db4cc;
    --ink-3:#7e93a9;
    --glow-cyan:0 0 14px rgba(56,225,255,.35);
    --font-display:'Rajdhani','Noto Sans SC',sans-serif;
    --font-body:'Noto Sans SC','Rajdhani',sans-serif;
    --font-mono:'Share Tech Mono',ui-monospace,monospace;
    --r-panel:10px;
    --r-card:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg-abyss);color:var(--ink);font-family:var(--font-body)}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, rgba(56,225,255,.10), transparent 60%),
      radial-gradient(900px 600px at 100% 110%, rgba(79,139,255,.08), transparent 55%),
      linear-gradient(180deg,var(--bg-grad-1),var(--bg-grad-2));
  }
  /* 网格底纹 + 扫描线 */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(var(--grid-line) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(circle at 50% 40%,#000 60%,transparent 100%);
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.35;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  .app{position:relative;z-index:2;height:100vh;width:100vw;display:grid;grid-template-rows:auto auto 1fr auto;gap:12px;padding:14px 18px 12px}

  /* ===== 顶栏 ===== */
  .topbar{display:flex;align-items:center;justify-content:space-between;height:62px;
    border-bottom:1px solid var(--panel-edge);padding-bottom:8px;position:relative}
  .topbar::after{content:"";position:absolute;left:0;bottom:-1px;width:240px;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);box-shadow:var(--glow-cyan)}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .mark{width:34px;height:34px;position:relative;flex:none}
  .brand .mark::before,.brand .mark::after{content:"";position:absolute;inset:0;border:2px solid var(--cyan);border-radius:50%;box-shadow:var(--glow-cyan)}
  .brand .mark::after{inset:7px;border-color:var(--blue);animation:spin 6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .brand h1{font-family:var(--font-display);font-weight:700;font-size:26px;letter-spacing:3px;line-height:1;color:var(--ink);text-shadow:var(--glow-cyan)}
  .brand .sub{font-family:var(--font-mono);font-size:11px;letter-spacing:4px;color:var(--cyan-dim);margin-top:4px}
  .clock{text-align:center}
  .clock .t{font-family:var(--font-display);font-weight:700;font-size:30px;letter-spacing:3px;color:var(--ink);line-height:1}
  .clock .d{font-family:var(--font-mono);font-size:12px;color:var(--ink-2);letter-spacing:2px;margin-top:3px}
  .status{display:flex;align-items:center;gap:18px}
  .stat-pill{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;color:var(--ink-2);letter-spacing:1px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);animation:pulse 1.8s ease-in-out infinite}
  .dot.warn{background:var(--amber);box-shadow:0 0 10px var(--amber)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .lat{color:var(--cyan)}

  /* ===== KPI 条 ===== */
  .kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;height:108px}
  .kpi{position:relative;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--panel-edge);border-radius:var(--r-card);
    padding:12px 16px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan);box-shadow:var(--glow-cyan)}
  .kpi.c-rose::before{background:var(--rose);box-shadow:0 0 12px var(--rose)}
  .kpi.c-teal::before{background:var(--teal);box-shadow:0 0 12px var(--teal)}
  .kpi.c-blue::before{background:var(--blue);box-shadow:0 0 12px var(--blue)}
  .kpi.c-amber::before{background:var(--amber);box-shadow:0 0 12px var(--amber)}
  .kpi .label{font-family:var(--font-body);font-size:13px;color:var(--ink-2);letter-spacing:1px;display:flex;align-items:center;gap:6px}
  .kpi .val{font-family:var(--font-display);font-weight:700;font-size:42px;line-height:1.05;color:var(--ink);margin-top:2px;font-variant-numeric:tabular-nums}
  .kpi .val .u{font-size:15px;color:var(--ink-3);font-weight:500;margin-left:4px}
  .kpi .delta{font-family:var(--font-mono);font-size:12px;margin-top:3px;color:var(--teal)}
  .kpi .delta.down{color:var(--rose)}
  .kpi .spark{position:absolute;right:10px;bottom:8px;width:84px;height:30px;opacity:.7}

  /* ===== 舞台 ===== */
  .stage{display:grid;grid-template-columns:1.05fr 1.95fr 1.05fr;gap:12px;min-height:0}
  .col{display:flex;flex-direction:column;gap:12px;min-height:0}
  .col.left{flex:1}
  .col.center{flex:1}
  .col.right{flex:1}

  .panel{position:relative;background:linear-gradient(180deg,rgba(12,24,40,.92),rgba(8,16,28,.92));
    border:1px solid var(--panel-edge);border-radius:var(--r-panel);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  /* 四角装饰 */
  .panel .corner{position:absolute;width:12px;height:12px;border:2px solid var(--cyan);opacity:.7}
  .panel .corner.tl{top:6px;left:6px;border-right:none;border-bottom:none}
  .panel .corner.tr{top:6px;right:6px;border-left:none;border-bottom:none}
  .panel .corner.bl{bottom:6px;left:6px;border-right:none;border-top:none}
  .panel .corner.br{bottom:6px;right:6px;border-left:none;border-top:none}
  .panel .ph{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 8px;border-bottom:1px solid rgba(22,50,79,.7)}
  .panel .ph .title{font-family:var(--font-display);font-weight:600;font-size:16px;letter-spacing:2px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .panel .ph .title::before{content:"";width:4px;height:15px;background:var(--cyan);box-shadow:var(--glow-cyan);border-radius:1px}
  .panel .ph .tag{font-family:var(--font-mono);font-size:11px;color:var(--cyan-dim);letter-spacing:1px}
  .panel .pb{flex:1;min-height:0;padding:10px 14px 12px;position:relative}
  .chart{width:100%;height:100%}

  /* sentiment / source 等高分配 */
  .col.left .panel:nth-child(1){flex:0 0 46%}
  .col.left .panel:nth-child(2){flex:1}
  .col.right .panel:nth-child(1){flex:0 0 26%}
  .col.right .panel:nth-child(2){flex:1}
  .col.right .panel:nth-child(3){flex:1}
  .col.center .panel:nth-child(1){flex:0 0 60%}
  .col.center .panel:nth-child(2){flex:1}

  /* 地域榜单 */
  .rank{display:flex;flex-direction:column;gap:7px;height:100%;overflow:hidden}
  .rank .row{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:10px}
  .rank .row .idx{font-family:var(--font-mono);font-size:13px;color:var(--cyan);text-align:center}
  .rank .row .bar-wrap{position:relative;height:18px;background:rgba(56,225,255,.06);border-radius:4px;overflow:hidden}
  .rank .row .bar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));box-shadow:var(--glow-cyan);border-radius:4px;transition:width .8s cubic-bezier(.2,.8,.2,1)}
  .rank .row .nm{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--ink);white-space:nowrap}
  .rank .row .ct{font-family:var(--font-mono);font-size:13px;color:var(--ink-2);min-width:48px;text-align:right}

  /* feed 列表 */
  .feed{display:flex;flex-direction:column;gap:8px;height:100%;overflow:hidden}
  .feed .item{border-left:2px solid var(--panel-edge);padding:7px 10px;background:rgba(56,225,255,.03);border-radius:0 6px 6px 0;animation:slidein .5s ease}
  .feed .item.fresh{border-left-color:var(--cyan);background:rgba(56,225,255,.10)}
  .feed .item .top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
  .feed .item .src{font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
  .feed .item .time{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-left:auto}
  .feed .item .tt{font-size:13px;color:var(--ink);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .badge{font-family:var(--font-mono);font-size:10px;padding:1px 7px;border-radius:999px;letter-spacing:.5px}
  .b-pos{color:var(--teal);border:1px solid rgba(46,230,166,.4);background:rgba(46,230,166,.08)}
  .b-neg{color:var(--rose);border:1px solid rgba(255,93,122,.4);background:rgba(255,93,122,.08)}
  .b-neu{color:var(--ink-2);border:1px solid rgba(157,180,204,.35);background:rgba(157,180,204,.06)}
  .b-risk{color:var(--amber);border:1px solid rgba(255,194,75,.4);background:rgba(255,194,75,.08)}
  .b-crit{color:#2a0710;background:var(--rose);box-shadow:0 0 10px var(--rose)}
  .b-handled{color:var(--teal);border:1px solid rgba(46,230,166,.4)}
  .b-pending{color:var(--amber);border:1px solid rgba(255,194,75,.4)}
  @keyframes slidein{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
  .alert .item{border-left-color:var(--amber)}
  .alert .item.crit{border-left-color:var(--rose);background:rgba(255,93,122,.08)}
  .alert .item .reason{font-size:12px;color:var(--ink-2);margin-top:3px;line-height:1.4}

  /* 底部滚动条 */
  .ticker{height:34px;border:1px solid var(--panel-edge);border-radius:6px;background:linear-gradient(90deg,rgba(10,20,36,.9),rgba(8,16,28,.9));
    display:flex;align-items:center;overflow:hidden;position:relative}
  .ticker .lab{flex:none;height:100%;display:flex;align-items:center;padding:0 14px;background:var(--cyan);color:#04121c;font-family:var(--font-display);font-weight:700;letter-spacing:2px;font-size:13px;z-index:2}
  .ticker .track{display:flex;gap:34px;white-space:nowrap;animation:scroll 38s linear infinite;padding-left:24px}
  .ticker .track span{font-family:var(--font-mono);font-size:13px;color:var(--ink-2);letter-spacing:1px}
  .ticker .track span b{color:var(--cyan);font-weight:400}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  .map-fallback{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--ink-3);font-family:var(--font-mono);font-size:12px;text-align:center}
  .scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.5;animation:scan 5s linear infinite;pointer-events:none}
  @keyframes scan{0%{top:0}100%{top:100%}}

  /* 动效偏好降级：尊重 prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition-duration:.01ms !important}
    .ticker .track{animation:none !important}
    .brand .mark::after{animation:none !important}
  }
</style>
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>舆情指挥中枢</h1>
        <div class="sub">OPINION COMMAND CENTER</div>
      </div>
    </div>
    <div class="clock">
      <div class="t" id="clk-time">--:--:--</div>
      <div class="d" id="clk-date">---- -- --</div>
    </div>
    <div class="status">
      <div class="stat-pill"><span class="dot" id="conn-dot"></span><span id="conn-text">实时链路 · 连接中</span></div>
      <div class="stat-pill">数据延迟 <span class="lat" id="lat">-- ms</span></div>
      <div class="stat-pill">系统 <span style="color:var(--teal)">运行正常</span></div>
    </div>
  </header>

  <!-- KPI 条 -->
  <section class="kpi-strip" id="kpi-strip">
    <div class="kpi c-cyan"><div class="label">舆情总量</div><div class="val"><span data-k="total">0</span></div><div class="delta" data-d="total">实时监测中</div><svg class="spark" data-spark="total" viewBox="0 0 84 30" preserveAspectRatio="none"></svg></div>
    <div class="kpi c-blue"><div class="label">今日新增</div><div class="val"><span data-k="today">0</span></div><div class="delta" data-d="today">较昨日 —</div><svg class="spark" data-spark="today" viewBox="0 0 84 30" preserveAspectRatio="none"></svg></div>
    <div class="kpi c-rose"><div class="label">高危舆情</div><div class="val"><span data-k="high_risk">0</span></div><div class="delta" data-d="high_risk">risk ≥ 70</div><svg class="spark" data-spark="high_risk" viewBox="0 0 84 30" preserveAspectRatio="none"></svg></div>
    <div class="kpi c-teal"><div class="label">事件总数</div><div class="val"><span data-k="event_count">0</span></div><div class="delta" data-d="event_count">专题研判中</div><svg class="spark" data-spark="event_count" viewBox="0 0 84 30" preserveAspectRatio="none"></svg></div>
    <div class="kpi c-amber"><div class="label">监测信源</div><div class="val"><span data-k="sources">0</span><span class="u">路</span></div><div class="delta" data-d="sources">全渠道覆盖</div><svg class="spark" data-spark="sources" viewBox="0 0 84 30" preserveAspectRatio="none"></svg></div>
  </section>

  <!-- 舞台 -->
  <main class="stage">
    <!-- 左列 -->
    <div class="col left">
      <div class="panel">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="ph"><div class="title">情感分布</div><div class="tag">SENTIMENT</div></div>
        <div class="pb"><div class="chart" id="ch-sentiment"></div></div>
      </div>
      <div class="panel">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="ph"><div class="title">来源分布</div><div class="tag">SOURCE</div></div>
        <div class="pb"><div class="chart" id="ch-source"></div></div>
      </div>
    </div>

    <!-- 中列 -->
    <div class="col center">
      <div class="panel">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="ph"><div class="title">地域舆情热力</div><div class="tag">GEO · LIVE</div></div>
        <div class="pb"><div class="chart" id="ch-map"></div><div class="map-fallback" id="map-fallback">地图资源加载中…<br/>（离线时自动切换为地域榜单视图）</div><div class="scanline"></div></div>
      </div>
      <div class="panel">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="ph"><div class="title">近 7 日传播趋势</div><div class="tag">TREND · 7D</div></div>
        <div class="pb"><div class="chart" id="ch-trend"></div></div>
      </div>
    </div>

    <!-- 右列 -->
    <div class="col right">
      <div class="panel">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="ph"><div class="title">地域榜单 TOP</div><div class="tag">REGION RANK</div></div>
        <div class="pb"><div class="rank" id="rank"></div></div>
      </div>
      <div class="panel">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="ph"><div class="title">实时快讯</div><div class="tag">LIVE FEED</div></div>
        <div class="pb"><div class="feed" id="feed-recent"></div></div>
      </div>
      <div class="panel alert">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="ph"><div class="title">预警滚动</div><div class="tag">ALERT</div></div>
        <div class="pb"><div class="feed" id="feed-alert"></div></div>
      </div>
    </div>
  </main>

  <!-- 底部滚动 -->
  <footer class="ticker">
    <div class="lab">实时解码</div>
    <div class="track" id="ticker-track"></div>
  </footer>
</div>

<script>
/* =========================================================================
   舆情指挥大屏 · 数据层
   -------------------------------------------------------------------------
   真实接口（对应 backend/app/api/dashboard.py）：
     GET {API_BASE}/dashboard/stats  -> {total,today,high_risk,event_count,trend,keywords,sources,sentiments,regions}
     GET {API_BASE}/dashboard/recent -> [{id,title,source,sentiment,risk_score,region_name,created_at}]
     GET {API_BASE}/dashboard/alerts -> [{id,opinion_id,rule_name,risk_level,opinion_title,trigger_reason,handled,created_at}]
   对接步骤：
     1) 把 API_BASE 改为后端地址（如 'http://localhost:8000'），确保后端已开启 CORS。
     2) （可选）把 WS_URL 改为推送地址（如 'ws://localhost:8000/ws/dashboard'），
        后端通过 WebSocket 主动推送 stats / recent / alert 增量，无需轮询。
   留空时自动使用内置模拟数据（mock），原型可直接双击预览。
   ========================================================================= */
const API_BASE = '';      // 接真实后端时填写，如 'http://localhost:8000'
const WS_URL   = '';      // 接实时推送时填写，如 'ws://localhost:8000/ws/dashboard'
const POLL_MS  = 3000;

const SENT_LABEL = {positive:'正面', negative:'负面', neutral:'中性'};
const RISK_LABEL = {low:'低危', medium:'中危', high:'高危', critical:'严重'};

/* ---------- 模拟数据（仅当 API_BASE/WS 不可用时启用） ---------- */
const PROV = ['广东','北京','江苏','浙江','四川','山东','上海','湖北','河南','福建','湖南','河北'];
const SRC  = ['微博','微信','抖音','新闻客户端','论坛','今日头条','知乎','贴吧','小红书','其他'];
const KWS  = ['暴雨预警','交通管制','食品安全','房价波动','营商环境','高温红色','区域停电','政策解读','消费投诉','校园安全','医保改革','文旅热度'];
const TITLES = [
  '某区暴雨致路段积水，市民呼吁加快排涝','高铁某线路临时停运引发退改签讨论',
  '夏季高温红色预警发布，户外作业引关注','某新盘交付质量争议在业主群发酵',
  '本地文旅夜市人气攀升，带动周边消费','医保报销新政落地首周反馈汇总',
  '校园食品安全抽检结果公布引热议','某商圈停电两小时，商户损失待评估',
  '新能源补贴退坡传闻引发车主讨论','老旧小区加装电梯意见分歧上热搜'
];
const RULES = ['高危舆情预警','负面情感激增','传播速度异常','跨源聚合预警','敏感词命中'];
const REASONS = ['1小时内同主题负面声量增长 320%','跨 5 个信源聚合且 risk_score ≥ 80','关键词命中敏感词库第 3 类','转发层级超过 4 层且增速异常'];
const REGION_COORD = {北京:[116.4,39.9],天津:[117.2,39.1],上海:[121.47,31.23],重庆:[106.55,29.56],河北:[114.5,38.05],山西:[112.55,37.87],辽宁:[123.43,41.8],吉林:[125.32,43.9],黑龙江:[126.64,45.76],江苏:[118.78,32.04],浙江:[120.15,30.27],安徽:[117.28,31.86],福建:[119.3,26.08],江西:[115.89,28.68],山东:[117.0,36.65],河南:[113.65,34.76],湖北:[114.3,30.6],湖南:[112.98,28.19],广东:[113.28,23.13],海南:[110.35,20.02],四川:[104.07,30.57],贵州:[106.71,26.57],云南:[102.71,25.04],陕西:[108.95,34.27],甘肃:[103.82,36.06],青海:[101.78,36.62],内蒙古:[111.65,40.82],广西:[108.33,22.84],西藏:[91.13,29.66],宁夏:[106.27,38.47],新疆:[87.62,43.82],香港:[114.17,22.32],澳门:[113.55,22.2],台湾:[121.5,25.05]};
const stripSuffix = n => n.replace(/(省|市|自治区|壮族自治区|回族自治区|维吾尔自治区|特别行政区)$/,'');

let seq = 1000;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[rnd(0,a.length-1)]}

function mockSnapshot(){
  const total = rnd(48000,52000);
  const today = rnd(1200,1800);
  const high_risk = rnd(180,260);
  const event_count = rnd(40,70);
  const trend = Array.from({length:7},(_,i)=>({date:dateShift(i-6),count:rnd(600,1400)}));
  const keywords = KWS.map(w=>({word:w,count:rnd(120,900)})).sort((a,b)=>b.count-a.count).slice(0,10);
  const sources = SRC.map(s=>({source:s,count:rnd(300,2600)})).sort((a,b)=>b.count-a.count);
  const sentiments = [
    {label:'positive',count:rnd(14000,18000)},
    {label:'neutral',count:rnd(18000,22000)},
    {label:'negative',count:rnd(9000,13000)}
  ];
  const regions = PROV.map(p=>({region_id:rnd(1,34),region_name:p,count:rnd(800,4200)})).sort((a,b)=>b.count-a.count);
  return {total,today,high_risk,event_count,trend,keywords,sources,sentiments,regions};
}
function dateShift(off){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().slice(0,10)}

let base = mockSnapshot();
// 让数据随tick小幅演化，营造"实时"观感
function evolve(prev){
  const p = JSON.parse(JSON.stringify(prev));
  p.total += rnd(-30,80);
  p.today += rnd(0,14);
  p.high_risk += rnd(-3,5);
  p.event_count += (Math.random()<0.2?1:0);
  const last = p.trend[p.trend.length-1];
  last.count = Math.max(200, last.count + rnd(-40,60));
  p.regions.forEach(r=>{ if(Math.random()<0.4) r.count += rnd(-10,25); });
  p.regions.sort((a,b)=>b.count-a.count);
  p.sentiments.forEach(s=>{ s.count += rnd(-40,60); });
  return p;
}
function mockRecent(){
  return {id:++seq,title:pick(TITLES),source:pick(SRC),sentiment:pick(['positive','negative','neutral']),
    risk_score:rnd(20,92),region_name:pick(PROV),created_at:new Date().toISOString()};
}
function mockAlert(){
  const lvl = pick(['low','medium','high','critical']);
  return {id:++seq,opinion_id:rnd(1,9000),rule_name:pick(RULES),risk_level:lvl,
    opinion_title:pick(TITLES),trigger_reason:pick(REASONS),handled:Math.random()<0.5,created_at:new Date().toISOString()};
}
let recents=[], alerts=[];
for(let i=0;i<8;i++) recents.push(mockRecent());
for(let i=0;i<8;i++) alerts.push(mockAlert());

/* ---------- 真实接口获取 ---------- */
async function getJSON(path){
  if(!API_BASE) return null;
  const r = await fetch(API_BASE+path,{headers:{'Accept':'application/json'}});
  if(!r.ok) throw new Error(path+' '+r.status);
  return r.json();
}
async function fetchSnapshot(){
  if(!API_BASE) return evolve(base);
  const [stats,recent,al] = await Promise.all([
    getJSON('/dashboard/stats'), getJSON('/dashboard/recent?limit=8'), getJSON('/dashboard/alerts?limit=8')
  ]);
  if(recent) recents = recent;
  if(al) alerts = al;
  return stats;
}

/* ============================ 渲染层 ============================ */
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];

const sparkHist={};
function drawSpark(key,val){
  sparkHist[key]=sparkHist[key]||[];
  sparkHist[key].push(val); if(sparkHist[key].length>12) sparkHist[key].shift();
  const h=sparkHist[key]; if(h.length<2) return;
  const W=84,H=30,max=Math.max(...h),min=Math.min(...h),rng=(max-min)||1;
  const pts=h.map((v,i)=>`${(i/(h.length-1)*W).toFixed(1)},${(H-((v-min)/rng)*H*0.8-3).toFixed(1)}`).join(' ');
  const color=getComputedStyle(document.documentElement).getPropertyValue(
    key==='high_risk'?'--rose':key==='sources'?'--amber':key==='event_count'?'--teal':'--cyan').trim();
  const svg=document.querySelector(`[data-spark="${key}"]`);
  if(svg) svg.innerHTML=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" opacity=".85"/>`;
}

function animateNum(el,to){
  const from = parseInt(el.textContent.replace(/[^\d]/g,''))||0;
  if(from===to){el.textContent=to.toLocaleString();return;}
  const t0=performance.now(),dur=600;
  function step(t){const k=Math.min(1,(t-t0)/dur);const v=Math.round(from+(to-from)*k);
    el.textContent=v.toLocaleString();if(k<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}
function renderKPI(d){
  animateNum($('[data-k="total"]'),d.total); drawSpark('total',d.total);
  animateNum($('[data-k="today"]'),d.today); drawSpark('today',d.today);
  animateNum($('[data-k="high_risk"]'),d.high_risk); drawSpark('high_risk',d.high_risk);
  animateNum($('[data-k="event_count"]'),d.event_count); drawSpark('event_count',d.event_count);
  $('[data-k="sources"]').textContent=d.sources?.length||0; drawSpark('sources',d.sources?.length||0);
}

const charts={};
function initCharts(){
  charts.sentiment=echarts.init($('#ch-sentiment'));
  charts.source=echarts.init($('#ch-source'));
  charts.map=echarts.init($('#ch-map'));
  charts.trend=echarts.init($('#ch-trend'));
  window.addEventListener('resize',()=>Object.values(charts).forEach(c=>c.resize()));
}
const AXIS_STYLE={axisLine:{lineStyle:{color:'#16324f'}},axisLabel:{color:'#9db4cc',fontFamily:'Share Tech Mono',fontSize:11},splitLine:{lineStyle:{color:'rgba(22,50,79,.5)'}}};

function renderCharts(d){
  // 情感分布 donut
  charts.sentiment.setOption({
    tooltip:{trigger:'item',backgroundColor:'#0a1424',borderColor:'#16324f',textStyle:{color:'#e8f4ff'}},
    legend:{bottom:0,left:'center',textStyle:{color:'#9db4cc',fontSize:11},itemWidth:10,itemHeight:10},
    series:[{type:'pie',radius:['46%','70%'],center:['50%','44%'],avoidLabelOverlap:true,
      itemStyle:{borderColor:'#04070f',borderWidth:2},
      label:{show:true,color:'#e8f4ff',fontSize:12,formatter:'{b}\n{d}%'},
      labelLine:{length:8,length2:8,lineStyle:{color:'#16324f'}},
      data:[
        {name:'正面',value:d.sentiments.find(s=>s.label==='positive')?.count||0,itemStyle:{color:'#2ee6a6'}},
        {name:'中性',value:d.sentiments.find(s=>s.label==='neutral')?.count||0,itemStyle:{color:'#4f8bff'}},
        {name:'负面',value:d.sentiments.find(s=>s.label==='negative')?.count||0,itemStyle:{color:'#ff5d7a'}}
      ]}]
  });
  // 来源分布 hbar
  const src=[...d.sources].sort((a,b)=>a.count-b.count);
  charts.source.setOption({
    grid:{left:64,right:24,top:10,bottom:6},
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'#0a1424',borderColor:'#16324f',textStyle:{color:'#e8f4ff'}},
    xAxis:{type:'value',...AXIS_STYLE},
    yAxis:{type:'category',data:src.map(s=>s.source),axisLine:{lineStyle:{color:'#16324f'}},axisTick:{show:false},axisLabel:{color:'#9db4cc',fontSize:11}},
    series:[{type:'bar',data:src.map(s=>s.count),barWidth:'55%',
      itemStyle:{borderRadius:[0,4,4,0],color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'#1c93b8'},{offset:1,color:'#38e1ff'}])},
      label:{show:true,position:'right',color:'#9db4cc',fontFamily:'Share Tech Mono',fontSize:11}}]
  });
  // 趋势 area
  charts.trend.setOption({
    grid:{left:46,right:18,top:18,bottom:24},
    tooltip:{trigger:'axis',backgroundColor:'#0a1424',borderColor:'#16324f',textStyle:{color:'#e8f4ff'}},
    xAxis:{type:'category',boundaryGap:false,data:d.trend.map(t=>t.date.slice(5)),...AXIS_STYLE},
    yAxis:{type:'value',...AXIS_STYLE},
    series:[{type:'line',smooth:true,data:d.trend.map(t=>t.count),symbol:'circle',symbolSize:6,
      lineStyle:{color:'#38e1ff',width:2,shadowColor:'rgba(56,225,255,.6)',shadowBlur:10},
      itemStyle:{color:'#38e1ff'},
      areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(56,225,255,.35)'},{offset:1,color:'rgba(56,225,255,0)'}])}}]
  });
  renderMap(d);
}

let mapReady=false;
function renderMap(d){
  if(!mapReady) return;
  const data=d.regions.map(r=>({name:window.__geoNames?.[r.region_name]||r.region_name,value:r.count}));
  const max=Math.max(...data.map(x=>x.value));
  const ripple=d.regions.slice(0,5).filter(r=>REGION_COORD[r.region_name]).map(r=>({name:r.region_name,value:[...REGION_COORD[r.region_name],r.count]}));
  charts.map.setOption({
    tooltip:{trigger:'item',backgroundColor:'#0a1424',borderColor:'#16324f',textStyle:{color:'#e8f4ff'},
      formatter:p=>p.seriesType==='effectScatter'?`${p.name}<br/>舆情量 ${p.value[2]}`:`${p.name}<br/>舆情量 ${p.value||0}`},
    visualMap:{min:0,max:max,calculable:true,left:14,bottom:14,itemHeight:90,textStyle:{color:'#9db4cc',fontSize:10},
      inRange:{color:['#0a1424','#0e3a52','#1c93b8','#38e1ff']},text:['高','低']},
    series:[
      {name:'舆情热力',type:'map',map:'china',roam:false,
        label:{show:false},
        itemStyle:{areaColor:'#0a1424',borderColor:'#16324f',borderWidth:.6},
        emphasis:{label:{show:true,color:'#e8f4ff'},itemStyle:{areaColor:'#16324f'}},
        data},
      {name:'热点',type:'effectScatter',coordinateSystem:'geo',rippleEffect:{brushType:'stroke',scale:3.5},
        symbolSize:v=>Math.max(6,Math.min(22,v[2]/180)),
        itemStyle:{color:'#ff5d7a',shadowColor:'#ff5d7a',shadowBlur:10},
        zlevel:2,data:ripple}
    ]
  });
}

function renderRank(d){
  const rows=d.regions.slice(0,8).map((r,i)=>{
    const pct=Math.round(r.count/Math.max(...d.regions.map(x=>x.count))*100);
    return `<div class="row"><div class="idx">${String(i+1).padStart(2,'0')}</div>
      <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div><div class="nm">${r.region_name}</div></div>
      <div class="ct">${r.count.toLocaleString()}</div></div>`;
  }).join('');
  $('#rank').innerHTML=rows;
}

function sentBadge(s){return s==='positive'?'<span class="badge b-pos">正面</span>':s==='negative'?'<span class="badge b-neg">负面</span>':'<span class="badge b-neu">中性</span>'}
function fmtTime(iso){const d=new Date(iso);return d.toTimeString().slice(0,8)}
function renderRecent(fresh){
  const items=recents.slice(0,9).map((r,i)=>`<div class="item ${fresh&&i===0?'fresh':''}">
    <div class="top">${sentBadge(r.sentiment)}<span class="src">${r.source} · ${r.region_name}</span><span class="time">${fmtTime(r.created_at)}</span></div>
    <div class="tt">${r.title}</div></div>`).join('');
  $('#feed-recent').innerHTML=items;
}
function renderAlerts(fresh){
  const items=alerts.slice(0,9).map((a,i)=>{
    const crit=a.risk_level==='critical';
    const rb=a.risk_level==='critical'?'b-crit':a.risk_level==='high'?'b-risk':'b-pending';
    const hb=a.handled?'b-handled':'b-pending';
    return `<div class="item ${crit?'crit':''}">
      <div class="top"><span class="badge ${rb}">${RISK_LABEL[a.risk_level]}</span><span class="src">${a.rule_name}</span>
        <span class="badge ${hb}">${a.handled?'已处置':'待处置'}</span><span class="time">${fmtTime(a.created_at)}</span></div>
      <div class="tt">${a.opinion_title}</div>
      <div class="reason">触发：${a.trigger_reason}</div></div>`;
  }).join('');
  $('#feed-alert').innerHTML=items;
}

function renderTicker(d){
  const parts=d.keywords.slice(0,8).map(k=>`<span><b>#${k.word}</b> 声量 ${k.count.toLocaleString()}</span>`)
    .concat(d.regions.slice(0,4).map(r=>`<span><b>${r.region_name}</b> 舆情 ${r.count.toLocaleString()}</span>`));
  const html=parts.join('');
  $('#ticker-track').innerHTML=html+html; // 双倍以实现无缝滚动
}

function renderAll(d){
  renderKPI(d); renderCharts(d); renderRank(d); renderRecent(false); renderAlerts(false); renderTicker(d);
  base=d;
}

/* ---------- 时钟 & 延迟 ---------- */
function tickClock(){
  const n=new Date();
  $('#clk-time').textContent=n.toTimeString().slice(0,8);
  $('#clk-date').textContent=n.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});
}
setInterval(tickClock,1000); tickClock();

function setLatency(){
  const ms=API_BASE?rnd(20,90):rnd(8,25);
  $('#lat').textContent=ms+' ms';
}

/* ---------- 主循环 ---------- */
async function poll(){
  try{
    const d=await fetchSnapshot();
    renderAll(d);
    $('#conn-dot').classList.remove('warn');
    $('#conn-text').textContent='实时链路 · 已连接';
    setLatency();
  }catch(err){
    // 真实接口失败则回退 mock 演化，保证大屏持续运行
    base=evolve(base); renderAll(base);
    $('#conn-dot').classList.add('warn');
    $('#conn-text').textContent='实时链路 · 模拟态';
  }
}

async function boot(){
  initCharts();
  // 中国地图（DataV GeoJSON，失败则保留地域榜单视图）
  try{
    const geo=await fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json').then(r=>r.json());
    echarts.registerMap('china',geo);
    window.__geoNames={};
    geo.features.forEach(f=>{ const n=f.properties && f.properties.name; if(n) window.__geoNames[stripSuffix(n)]=n; });
    mapReady=true;
  }catch(e){ $('#map-fallback').style.display='flex'; }
  await poll();
  setInterval(poll,POLL_MS);
  // connectWS(); // 接 WebSocket 推送时取消注释
}
boot();
</script>
