<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大厂县公安互联网舆情监测研判平台</title>
  <style>/* =========================================================================
   大厂县公安互联网舆情监测研判平台 · Apple 风格原型
   Design tokens 取自 Apple Human Interface Guidelines
   - 背景 #f5f5f7 / 卡片纯白 / 圆角 16-20px / 轻阴影 / 大量留白
   - 仅以蓝色 (#0071e3) 作点缀，杜绝大面积蓝色后台风
   ========================================================================= */

:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text-1: #1d1d1f;
  --text-2: #6e6e73;
  --text-3: #86868b;
  --separator: #d2d2d7;
  --separator-soft: #e8e8ed;

  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-soft: #e8f1fd;

  --red: #ff3b30;
  --orange: #ff9f0a;
  --green: #34c759;

  --radius-xl: 22px;
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;

  --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 32px rgba(0, 0, 0, 0.05);
  --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04), 0 4px 14px rgba(0, 0, 0, 0.05);
  --shadow-pop: 0 10px 40px rgba(0, 0, 0, 0.18);

  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
    "Inter", "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* ====================== 高保真增强：统计卡趋势指示 ====================== */
.stat-card .s-foot-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 10px; }
.trend-badge {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
  padding: 2px 7px; border-radius: 980px; white-space: nowrap;
}
.trend-badge.up-bad { background: rgba(255, 59, 48, 0.1); color: var(--red); }
.trend-badge.down-good { background: rgba(52, 199, 89, 0.12); color: #1a8e3c; }
.trend-badge.up-good { background: rgba(52, 199, 89, 0.12); color: #1a8e3c; }
.trend-badge.down-bad { background: rgba(255, 59, 48, 0.1); color: var(--red); }
.trend-badge.flat { background: var(--separator-soft); color: var(--text-3); }

/* 段落切换（趋势 7/14/30） */
.seg-group { display: inline-flex; background: var(--separator-soft); border-radius: 980px; padding: 3px; gap: 2px; }
.seg-btn {
  border: none; background: transparent; color: var(--text-2);
  font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 980px;
  transition: background 0.15s ease, color 0.15s ease;
}
.seg-btn:hover { color: var(--text-1); }
.seg-btn.active { background: #fff; color: var(--text-1); box-shadow: var(--shadow-soft); }

/* 关键词排名 */
.kw-row-rank { grid-template-columns: 26px 96px 1fr 44px 28px; }
.kw-rank {
  width: 22px; height: 22px; border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--text-3); background: var(--separator-soft); font-variant-numeric: tabular-nums;
}
.kw-rank.top { background: var(--accent); color: #fff; }

/* 趋势图容器 + tooltip */
.trend-chart { position: relative; width: 100%; }
.trend-tip {
  position: absolute; top: 14px; transform: translateX(-50%);
  background: rgba(29, 29, 31, 0.94); color: #fff; padding: 7px 12px; border-radius: 10px;
  font-size: 12.5px; pointer-events: none; opacity: 0; transition: opacity 0.15s ease; white-space: nowrap;
  display: flex; flex-direction: column; gap: 2px; z-index: 5;
}
.trend-tip b { font-weight: 600; }
.trend-tip span { color: #c7c7cc; font-variant-numeric: tabular-nums; }
.trend-svg .trend-pt { transition: r 0.12s ease; }
.trend-svg .trend-pt.hot { r: 6.5; fill: var(--accent); }

/* 情感分布环形图 */
.donut-wrap { display: flex; align-items: center; gap: 22px; margin-top: 10px; flex-wrap: wrap; }
.donut-svg { width: 140px; height: 140px; flex-shrink: 0; }
.donut-legends { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 140px; }
.donut-legend { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-1); }
.donut-legend .dl-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.donut-legend b { margin-left: auto; font-weight: 700; font-variant-numeric: tabular-nums; }
.donut-legend i { width: 42px; text-align: right; font-style: normal; color: var(--text-3); font-size: 12.5px; font-variant-numeric: tabular-nums; }

/* 多列网格 */
.dash-cols-3 { display: grid; grid-template-columns: 1fr 2fr; gap: 18px; }
.dash-cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }

/* sparkline / 24h */
.spark-svg { width: 100%; height: 48px; display: block; }
.hour-svg { width: 100%; height: auto; display: block; }

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }

button { font-family: var(--font); cursor: pointer; }

/* ---------- 通用排版 ---------- */
.h-page-title { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
.h-page-sub { font-size: 14px; color: var(--text-2); margin: 4px 0 0; }
.section-title { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
.muted { color: var(--text-2); }
.mono { font-variant-numeric: tabular-nums; }

/* ---------- 按钮 ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: 980px;
  padding: 10px 20px;
  font-size: 15px;
  font-weight: 500;
  transition: background-color 0.18s ease, transform 0.12s ease, opacity 0.18s ease;
  user-select: none;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.55; cursor: default; }
.btn-ghost { background: var(--separator-soft); color: var(--text-1); }
.btn-ghost:hover { background: #dededf; }
.btn-quiet { background: transparent; color: var(--accent); padding: 8px 12px; }
.btn-quiet:hover { background: var(--accent-soft); }

/* ---------- 标签 / 胶囊 ---------- */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 11px;
  border-radius: 980px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  white-space: nowrap;
}
.pill .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.pill-red { background: rgba(255, 59, 48, 0.1); color: var(--red); }
.pill-orange { background: rgba(255, 159, 10, 0.12); color: #c77700; }
.pill-green { background: rgba(52, 199, 89, 0.12); color: #1a8e3c; }
.pill-gray { background: rgba(110, 110, 115, 0.12); color: var(--text-2); }
.pill-blue { background: var(--accent-soft); color: var(--accent); }

/* ---------- 卡片 ---------- */
.card {
  background: var(--card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 24px;
}
.card-pad-lg { padding: 28px 30px; }

/* ============================== 登录页 ============================== */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background:
    radial-gradient(1200px 600px at 50% -10%, #eef4fb 0%, rgba(238, 244, 251, 0) 60%),
    var(--bg);
}
.login-card {
  width: 412px;
  max-width: 100%;
  background: var(--card);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-pop);
  padding: 44px 40px 40px;
  text-align: center;
}
.login-badge {
  width: 64px; height: 64px;
  margin: 0 auto 22px;
  border-radius: 18px;
  background: linear-gradient(135deg, #0071e3, #42a5f5);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 30px; font-weight: 700;
  box-shadow: 0 8px 24px rgba(0, 113, 227, 0.28);
}
.login-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
.login-sub { font-size: 13px; color: var(--text-3); margin: 8px 0 28px; letter-spacing: 0.01em; }

.field { text-align: left; margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: var(--text-2); margin-bottom: 7px; font-weight: 500; }
.input {
  width: 100%;
  height: 46px;
  padding: 0 15px;
  font-size: 15px;
  color: var(--text-1);
  background: #fbfbfd;
  border: 1px solid var(--separator);
  border-radius: var(--radius-md);
  outline: none;
  transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}
.input:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
}
.login-btn { width: 100%; height: 48px; font-size: 16px; margin-top: 8px; }
.login-hint { margin-top: 18px; font-size: 12.5px; color: var(--text-3); }
.login-hint code {
  background: var(--separator-soft);
  padding: 2px 7px;
  border-radius: 6px;
  font-size: 12px;
}

/* ============================== 应用骨架 ============================== */
.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 246px;
  flex-shrink: 0;
  padding: 26px 16px;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 12px 22px;
}
.brand-logo {
  width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0;
  background: linear-gradient(135deg, #0071e3, #42a5f5);
  color: #fff; font-weight: 700; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
.brand-name { font-size: 15px; font-weight: 600; line-height: 1.25; letter-spacing: -0.01em; }
.brand-name small { display: block; font-size: 11.5px; color: var(--text-3); font-weight: 400; }

.nav { display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  border-radius: 12px;
  color: var(--text-2);
  font-size: 14.5px; font-weight: 500;
  transition: background-color 0.15s ease, color 0.15s ease;
}
.nav-item:hover { background: var(--separator-soft); color: var(--text-1); }
.nav-item.active { background: #e9e9ec; color: var(--text-1); font-weight: 600; }
.nav-item .ico { width: 20px; text-align: center; font-size: 16px; }
.nav-spacer { flex: 1; }
.nav-user {
  margin-top: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  background: var(--card);
  box-shadow: var(--shadow-soft);
  display: flex; align-items: center; gap: 10px;
}
.nav-user .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px;
}
.nav-user .u-name { font-size: 13.5px; font-weight: 600; }
.nav-user .u-role { font-size: 11.5px; color: var(--text-3); }
.nav-user .u-out { margin-left: auto; }

/* ---------- 主内容 ---------- */
.main {
  flex: 1;
  min-width: 0;
  max-width: 1440px;
  margin: 0 auto;
  padding: 34px 44px 60px;
}
.topbar {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px; margin-bottom: 26px;
}
.topbar .actions { display: flex; gap: 10px; align-items: center; }

/* ============================== Dashboard ============================== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
  margin-bottom: 18px;
}
.stat-card { padding: 22px 24px; }
.stat-card .s-label { font-size: 14px; color: var(--text-2); margin-bottom: 10px; }
.stat-card .s-value { font-size: 38px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.stat-card .s-value.danger { color: var(--red); }
.stat-card .s-foot { font-size: 12.5px; color: var(--text-3); margin-top: 10px; }
.stat-card .s-ico {
  float: right; width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 19px;
  background: var(--accent-soft); color: var(--accent);
}
.stat-card.is-red .s-ico { background: rgba(255, 59, 48, 0.1); color: var(--red); }
.stat-card.is-green .s-ico { background: rgba(52, 199, 89, 0.12); color: #1a8e3c; }
.stat-card.is-amber .s-ico { background: rgba(255, 159, 10, 0.12); color: #c77700; }

.dash-row {
  display: grid;
  grid-template-columns: 1.55fr 1fr;
  gap: 18px;
}
.chart-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.chart-box { width: 100%; }
.trend-svg { width: 100%; height: auto; display: block; }

/* 关键词排行（HTML 条形，避免外部依赖） */
.kw-list { display: flex; flex-direction: column; gap: 14px; margin-top: 6px; }
.kw-row { display: grid; grid-template-columns: 96px 1fr 44px; align-items: center; gap: 12px; }
.kw-word { font-size: 14px; color: var(--text-1); font-weight: 500; }
.kw-track { height: 10px; background: var(--separator-soft); border-radius: 980px; overflow: hidden; }
.kw-fill {
  height: 100%;
  border-radius: 980px;
  background: linear-gradient(90deg, #0071e3, #4aa3ff);
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
.kw-count { font-size: 13px; color: var(--text-2); text-align: right; font-variant-numeric: tabular-nums; }

/* ============================== 表格（舆情/事件） ============================== */
.toolbar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 18px;
}
.filters { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex: 1; }
.select, .search {
  height: 42px;
  padding: 0 14px;
  font-size: 14px;
  color: var(--text-1);
  background: var(--card);
  border: 1px solid var(--separator);
  border-radius: 12px;
  outline: none;
  transition: border-color 0.18s ease, box-shadow 0.18s ease;
}
.select { min-width: 160px; }
.search { min-width: 220px; flex: 1; max-width: 320px; }
.select:focus, .search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
}
.table-card { padding: 6px 6px 14px; overflow: hidden; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 14px; }
table.tbl thead th {
  text-align: left;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text-3);
  padding: 14px 18px;
  border-bottom: 1px solid var(--separator-soft);
  white-space: nowrap;
}
table.tbl tbody td {
  padding: 15px 18px;
  border-bottom: 1px solid var(--separator-soft);
  color: var(--text-1);
  vertical-align: middle;
}
table.tbl tbody tr { transition: background-color 0.12s ease; }
table.tbl tbody tr:hover { background: #fafafc; }
table.tbl tbody tr:last-child td { border-bottom: none; }
table.tbl .col-center { text-align: center; }
table.tbl .col-num { text-align: right; font-variant-numeric: tabular-nums; }
.t-link { color: var(--accent); font-weight: 500; }
.t-link:hover { text-decoration: underline; }
.t-title { font-weight: 500; color: var(--text-1); }
.risk-num { font-weight: 600; font-variant-numeric: tabular-nums; }
.empty-row td { text-align: center; color: var(--text-3); padding: 40px 0; }

.pager { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 16px 18px 0; }
.pager .p-info { color: var(--text-3); font-size: 13px; margin-right: auto; }
.pager button {
  min-width: 34px; height: 34px; padding: 0 10px;
  border: 1px solid var(--separator); background: var(--card);
  border-radius: 9px; color: var(--text-1); font-size: 13.5px;
  transition: background 0.15s ease;
}
.pager button:hover:not(:disabled) { background: var(--separator-soft); }
.pager button.active { background: var(--text-1); color: #fff; border-color: var(--text-1); }
.pager button:disabled { opacity: 0.4; cursor: default; }

/* ============================== 舆情详情 ============================== */
.detail-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; align-items: start; }
.detail-back { margin-bottom: 18px; }
.detail-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 14px; line-height: 1.35; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 8px 22px; font-size: 13px; color: var(--text-2); margin-bottom: 16px; }
.detail-divider { height: 1px; background: var(--separator-soft); margin: 18px 0; }
.detail-content { font-size: 15px; line-height: 1.85; color: #2b2b2e; white-space: pre-wrap; }
.detail-url { color: var(--accent); word-break: break-all; font-size: 13.5px; }

.ai-block { margin-bottom: 20px; }
.ai-label { font-size: 12.5px; color: var(--text-3); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.02em; }
.ai-text { font-size: 14.5px; line-height: 1.7; color: var(--text-1); }
.risk-big { font-size: 44px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
.kw-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.kw-tag { background: var(--accent-soft); color: var(--accent); padding: 5px 12px; border-radius: 980px; font-size: 13px; font-weight: 500; }
.ai-actions { margin-top: 6px; }
.ai-status-line { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.spinner {
  width: 15px; height: 15px; border-radius: 50%;
  border: 2px solid var(--separator); border-top-color: var(--accent);
  animation: spin 0.7s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ====================== 详情页增强 ====================== */
.ai-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; }
.ai-spark { flex: 1; max-width: 240px; }
.kw-clouds { display: flex; flex-wrap: wrap; gap: 8px 12px; align-items: baseline; margin-top: 4px; }
.kw-cloud { display: inline-block; padding: 5px 12px; border-radius: 980px; background: var(--accent-soft); color: var(--accent); font-weight: 600; line-height: 1.3; }
.score-bar { flex: 1; height: 8px; background: var(--separator-soft); border-radius: 980px; overflow: hidden; min-width: 90px; }
.score-fill { height: 100%; border-radius: 980px; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }

/* 传播概览 */
.prop-overview { margin-top: 4px; }
.po-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.po-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--separator-soft); font-size: 14px; }
.po-row span { color: var(--text-2); }
.po-row b { font-weight: 600; }
.po-bars { margin: 14px 0 4px; }
.btn-block { width: 100%; justify-content: center; }

/* 相关舆情 */
.rel-list { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
.rel-item { display: flex; flex-direction: column; gap: 4px; padding: 12px 14px; border-radius: 12px; transition: background 0.12s ease; }
.rel-item:hover { background: #fafafc; }
.rel-title { font-size: 14.5px; color: var(--text-1); font-weight: 500; }
.rel-meta { font-size: 12.5px; color: var(--text-3); display: flex; align-items: center; gap: 6px; }

/* 处置记录时间线 */
.log-list { display: flex; flex-direction: column; gap: 2px; }
.log-item { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; }
.log-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--accent); }
.log-dot.collect { background: var(--accent); }
.log-dot.ai { background: var(--green); }
.log-dot.push { background: #c77700; }
.log-dot.wait { background: var(--text-3); }
.log-dot.warn { background: var(--red); }

/* 事件详情页 */
.crumb { font-size: 13px; color: var(--accent); margin: 2px 0 6px; }
.crumb a:hover { text-decoration: underline; }
.ev-summary { font-size: 15px; line-height: 1.65; color: var(--text-2); margin: 0; }
.ev-meta-pill { display: inline-flex; align-items: center; }
.log-text { font-size: 14px; color: var(--text-1); }
.log-time { font-size: 12px; color: var(--text-3); margin-top: 2px; font-variant-numeric: tabular-nums; }

/* ============================== Toast ============================== */
.toast {
  position: fixed; left: 50%; bottom: 38px; transform: translateX(-50%) translateY(20px);
  background: rgba(29, 29, 31, 0.94);
  color: #fff; padding: 12px 22px; border-radius: 14px;
  font-size: 14px; opacity: 0; pointer-events: none;

  /* ----------------------------- SVG 趋势图（无依赖） ----------------------------- */
  function trendSVG(data) {
    const W = 720, H = 300, padL = 44, padR = 20, padT = 20, padB = 42;
    const plotW = W - padL - padR, plotH = H - padT - padB;
    const max = Math.max(1, ...data.map((d) => d.count));
    const n = data.length;
    const x = (i) => padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
    const y = (v) => padT + plotH - (v / max) * plotH;
    const baseY = padT + plotH;

    const pts = data.map((d, i) => [x(i), y(d.count)]);
    const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
    const area = line + ` L${x(n - 1).toFixed(1)} ${baseY} L${x(0).toFixed(1)} ${baseY} Z`;

    let grid = "";
    const steps = 3;
    for (let i = 0; i <= steps; i++) {
      const gv = Math.round((max / steps) * i);
      const gy = y(gv);
      grid += `<line x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" stroke="#e8e8ed" stroke-width="1"/>`;
      grid += `<text x="${padL - 10}" y="${gy + 4}" text-anchor="end" font-size="11" fill="#86868b">${gv}</text>`;
    }
    const dots = pts.map((p, i) =>
      `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4.5" fill="#fff" stroke="#0071e3" stroke-width="2.5"/>`
    ).join("");
    const labels = data.map((d, i) =>
      `<text x="${x(i).toFixed(1)}" y="${H - 16}" text-anchor="middle" font-size="11.5" fill="#86868b">${fmtDate(d.date)}</text>`
    ).join("");

    return `<svg class="trend-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="日舆情趋势折线图">
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#0071e3" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#0071e3" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${grid}
      <path d="${area}" fill="url(#areaGrad)"/>
      <path d="${line}" fill="none" stroke="#0071e3" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${labels}
    </svg>`;
  }

  // 传播路径网络图（SVG，无依赖）：起源 平台 关键节点
  // 优化：加大留白、阶段表头、关键节点用圆角 chip，避免图文拥挤
function propagationNetworkSVG(platforms, nodes) {
    const W = 880, H = 600;
    const headerY = 36;
    const top = 96, bottom = H - 44;            // P=6 时纵向间距≈92px，名与数留足间隙不重叠
    const origin = { x: 104, y: (top + bottom) / 2 };
    const pX = 388, nX = 772;
    const P = platforms.length, N = nodes.length;
    const pY = (i) => (P === 1 ? (top + bottom) / 2 : top + (i / (P - 1)) * (bottom - top));
    const nY = (i) => (N === 1 ? (top + bottom) / 2 : top + (i / (N - 1)) * (bottom - top));

    let links = "";
    platforms.forEach((_, i) => {
      const y = pY(i);
      links += `<path class="net-link" d="M ${origin.x} ${origin.y} Q ${(origin.x + pX) / 2} ${y} ${pX} ${y}"/>`;
    });
    platforms.forEach((_, i) => {
      const ni = N === 0 ? 0 : i % N;
      const py = pY(i), ny = nY(ni);
      links += `<path class="net-link" d="M ${pX} ${py} Q ${(pX + nX) / 2} ${ny} ${nX} ${ny}"/>`;
    });

    // 阶段表头（明从左到右"的叙事逻辑    
    const headers =
      `<text class="net-stage" x="${origin.x}" y="${headerY}" text-anchor="middle">舆情起源</text>` +
      `<text class="net-stage" x="${pX}" y="${headerY}" text-anchor="middle">平台扩散</text>` +
      `<text class="net-stage" x="${nX}" y="${headerY}" text-anchor="middle">关键节点</text>`;

    // 平台节点（标签上26 / 数值下30，间距足够不与相邻节点重叠）
    const pNodes = platforms
      .map((p, i) => {
        const y = pY(i);
        return `<circle class="net-node-circle" cx="${pX}" cy="${y}" r="11"/>
                <text class="net-node-label" x="${pX}" y="${y - 32}" text-anchor="middle">${esc(p.name)}</text>
                <text class="net-node-sub" x="${pX}" y="${y + 36}" text-anchor="middle">${p.value} </text>`;
      })
      .join("");

    // 关键传播节点（圆chip，文字内嵌、不压连线）
    const nNodes = nodes
      .map((n, i) => {
        const y = nY(i);
        const w = Math.max(76, n.name.length * 14 + 30);
        const x0 = nX - w / 2;
        return `<rect class="net-chip" x="${x0}" y="${y - 16}" width="${w}" height="32" rx="16"/>
                <text class="net-chip-label" x="${nX}" y="${y + 5}" text-anchor="middle">${esc(n.name)}</text>
                <text class="net-node-sub" x="${nX}" y="${y + 36}" text-anchor="middle">影响${esc(n.impact)}</text>`;
      })
      .join("");

    return `<svg class="net-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="传播路径网络>
        <defs>
          <radialGradient id="originG" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#0071e3"/><stop offset="100%" stop-color="#0a84ff"/>
          </radialGradient>
        </defs>
        ${links}
        ${headers}
        ${pNodes}
        ${nNodes}
        <circle class="net-node-origin" cx="${origin.x}" cy="${origin.y}" r="19" fill="url(#originG)"/>
        <text x="${origin.x}" y="${origin.y + 4}" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">起源</text>
        <text x="${origin.x}" y="${origin.y + 42}" text-anchor="middle" class="net-node-sub">${esc(platforms.length)} 个平</text>
      </svg>`;
  }

  /* ----------------------------- 页面：舆情列----------------------------- */
  const opState = { source: "", risk_level: "", keyword: "", page: 1, size: 10 };

  function renderOpinions() {
    const sources = Array.from(new Set(opinions.map((o) => o.source)));
    const filtered = opinions.filter((o) => {
      if (opState.source && o.source !== opState.source) return false;
      // 真实系统：risk_level 参数映射sentiment 字段
      if (opState.risk_level && o.sentiment !== opState.risk_level) return false;
      if (opState.keyword) {
        const k = opState.keyword.toLowerCase();
        const hay = (o.keywords + o.title + o.content).toLowerCase();
        if (!hay.includes(k)) return false;
      }
      return true;
    });

    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / opState.size));
    if (opState.page > pages) opState.page = pages;
    const start = (opState.page - 1) * opState.size;
    const rows = filtered.slice(start, start + opState.size);

    const sourceOpts = ['<option value="">来源（全部）</option>']
      .concat(sources.map((s) => `<option value="${esc(s)}" ${opState.source === s ? "selected" : ""}>${esc(s)}</option>`))
      .join("");

    const riskOpts = [
      '<option value="">风险等级（全部）</option>',
      `<option value="negative" ${opState.risk_level === "negative" ? "selected" : ""}>负面 negative</option>`,
      `<option value="neutral" ${opState.risk_level === "neutral" ? "selected" : ""}>中neutral</option>`,
      `<option value="positive" ${opState.risk_level === "positive" ? "selected" : ""}>正面 positive</option>`,
    ].join("");

    const body = rows.length
      ? rows
          .map(
            (o) => `
        <tr data-id="${o.id}" style="cursor:pointer">
          <td class="col-num muted">${o.id}</td>
          <td><a class="t-link t-title" href="#/opinion/${o.id}">${esc(o.title)}</a></td>
          <td class="muted">${esc(o.source)}</td>
          <td class="col-center muted mono">${fmtTime(o.publish_time)}</td>
          <td class="col-center"><span class="risk-num" style="color:${riskColorInline(o.risk_score)}">${o.risk_score}</span></td>
          <td class="col-center">${sentimentPill(o.sentiment)}</td>
          <td class="col-center">${statusPill(o.analysis_status)}</td>
        </tr>`
          )
          .join("")
      : `<tr class="empty-row"><td colspan="7">暂无符合条件的舆</td></tr>`;

    // 分页按钮
    let pager = "";
    const pns = [];
    if (pages <= 7) {
      for (let i = 1; i <= pages; i++) pns.push(i);
    } else {
      pns.push(1);
      if (opState.page > 3) pns.push("...");
      for (let i = Math.max(2, opState.page - 1); i <= Math.min(pages - 1, opState.page + 1); i++) pns.push(i);
      if (opState.page < pages - 2) pns.push("...");
      pns.push(pages);
    }
    pager = pns
      .map((p) =>
        p === "..."
          ? `<button disabled>...</button>`
          : `<button class="${p === opState.page ? "active" : ""}" data-page="${p}">${p}</button>`
      )
      .join("");

    const inner = `
      <div class="topbar">
        <div>
          <h1 class="h-page-title">舆情列表</h1>
          <p class="h-page-sub">${total} 条舆· 支持来源 / 风险等级 / 关键词筛</p>
        </div>
      </div>

      <div class="toolbar">
        <div class="filters">
          <select class="select" id="fSource">${sourceOpts}</select>
          <select class="select" id="fRisk">${riskOpts}</select>
          <input class="search" id="fKeyword" type="text" placeholder="关键/ 标题 / 内容" value="${esc(opState.keyword)}" />
          <button class="btn btn-primary" id="fSearch">搜索</button>
          <button class="btn btn-ghost" id="fReset">重置</button>
        </div>
      </div>

      <div class="card table-card">
        <table class="tbl">
          <thead>
            <tr>
              <th class="col-num">ID</th>
              <th>标题</th>
              <th>来源</th>
              <th class="col-center">时间</th>
              <th class="col-center">风险评分</th>
              <th class="col-center">情感</th>
              <th class="col-center">AI 状</th>
            </tr>
          </thead>
          <tbody id="opBody">${body}</tbody>
        </table>
        <div class="pager">
          <span class="p-info">${opState.page} / ${pages} · 每页 ${opState.size} </span>
          <button id="prevPage" ${opState.page <= 1 ? "disabled" : ""}>上一</button>
          ${pager}
          <button id="nextPage" ${opState.page >= pages ? "disabled" : ""}>下一</button>
        </div>
      </div>`;

    $app.innerHTML = shell("#/opinions", inner);
    bindShell();

    document.getElementById("fSource").addEventListener("change", (e) => { opState.source = e.target.value; opState.page = 1; renderOpinions(); });
    document.getElementById("fRisk").addEventListener("change", (e) => { opState.risk_level = e.target.value; opState.page = 1; renderOpinions(); });
    document.getElementById("fSearch").addEventListener("click", () => { opState.keyword = document.getElementById("fKeyword").value.trim(); opState.page = 1; renderOpinions(); });
    document.getElementById("fKeyword").addEventListener("keydown", (e) => { if (e.key === "Enter") { opState.keyword = e.target.value.trim(); opState.page = 1; renderOpinions(); } });
    document.getElementById("fReset").addEventListener("click", () => { opState.source = ""; opState.risk_level = ""; opState.keyword = ""; opState.page = 1; renderOpinions(); });
    document.getElementById("prevPage").addEventListener("click", () => { if (opState.page > 1) { opState.page--; renderOpinions(); } });
    document.getElementById("nextPage").addEventListener("click", () => { if (opState.page < pages) { opState.page++; renderOpinions(); } });
    document.querySelectorAll("#opBody tr[data-id]").forEach((tr) =>
      tr.addEventListener("click", (e) => {
        if (e.target.tagName === "A") return; // 链接已处理
        location.hash = "#/opinion/" + tr.getAttribute("data-id");
      })
    );
    document.querySelectorAll(".pager button[data-page]").forEach((b) =>
      b.addEventListener("click", () => { opState.page = Number(b.getAttribute("data-page")); renderOpinions(); })
    );
  }

          renderOpinionDetail(id);
          toast("AI 分析完成");
        }, 1300);
      });
    }
  }

        </div>
        <div class="card stat-card is-amber">
          <div class="s-ico" style="background:rgba(110,110,115,.12);color:var(--text-2)"></div>
          <div class="s-label">待处</div>
          <div class="s-value mono">${pending}</div>
          <div class="s-foot">需及时响应</div>
        </div>
        <div class="card stat-card is-red">
          <div class="s-ico" style="background:rgba(255,59,48,.1);color:var(--red)"></div>
          <div class="s-label">红色预警</div>
          <div class="s-value mono danger">${red}</div>
          <div class="s-foot">特级 / 需立即处置</div>
        </div>
        <div class="card stat-card is-green">
          <div class="s-ico" style="background:rgba(52,199,89,.12);color:#1a8e3c"></div>
          <div class="s-label">已处</div>
          <div class="s-value mono">${done}</div>
          <div class="s-foot">闭环完成</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="filters">
          <select class="select" id="aLevel">${levelOpts}</select>
          <select class="select" id="aStatus">${statusOpts}</select>
          <button class="btn btn-ghost" id="aReset">重置</button>
        </div>
      </div>

      <div class="card table-card">
        <table class="tbl">
          <thead>
            <tr>
              <th class="col-center">等级</th>
              <th>预警标题</th>
              <th>来源</th>
              <th>触发原因</th>
              <th class="col-center">时间</th>
              <th class="col-center">状</th>
            </tr>
          </thead>
          <tbody id="alBody">${body}</tbody>
        </table>
      </div>`;

    $app.innerHTML = shell("#/alerts", inner);
    bindShell();

    document.getElementById("aLevel").addEventListener("change", (e) => { alertState.level = e.target.value; renderAlerts(); });
    document.getElementById("aStatus").addEventListener("change", (e) => { alertState.status = e.target.value; renderAlerts(); });
    document.getElementById("aReset").addEventListener("click", () => { alertState.level = ""; alertState.status = ""; renderAlerts(); });
  }

  /* ----------------------------- 页面：传播溯----------------------------- */
  const propState = { eventId: 1 };

  function renderPropagation() {
    const ev = EVENTS.find((e) => e.id === Number(propState.eventId)) || EVENTS[0];
    const data = PROPAGATION[ev.id] || PROPAGATION[1];

    const pMax = Math.max(1, ...data.platforms.map((p) => p.value));
    const platHTML = data.platforms
      .map(
        (p) => `
        <div class="kw-row">
          <div class="kw-word">${esc(p.name)}</div>
          <div class="kw-track"><div class="kw-fill" style="width:${(p.value / pMax) * 100}%"></div></div>
          <div class="kw-count">${p.value}</div>
        </div>`
      )
      .join("");

    const tlHTML = data.milestones
      .map(
        (m) => `
        <div class="tl-item ${m.level === "green" ? "" : m.level}">
          <span class="tl-dot"></span>
          <div class="tl-time">${esc(m.time)}</div>
          <div class="tl-text">${esc(m.text)}</div>
        </div>`
      )
      .join("");

    const nodeHTML = data.nodes
      .map(
        (n) => `
        <div class="node-row">
          <div class="node-ava">${esc(n.name.slice(0, 1))}</div>
          <div class="node-meta">
            <div class="node-name">${esc(n.name)}</div>
            <div class="node-role">${esc(n.role)} · ${esc(n.fans)} 粉丝</div>
          </div>
          <span class="pill pill-${n.impact === "" ? "red" : n.impact === "" ? "orange" : "gray"}">${esc(n.impact)}</span>
        </div>`
      )
      .join("");

    const opts = EVENTS.map(
      (e) => `<option value="${e.id}" ${e.id === ev.id ? "selected" : ""}>${esc(e.title)}</option>`
    ).join("");

    const inner = `
      <div class="topbar">
        <div>
          <h1 class="h-page-title">传播溯源</h1>
          <p class="h-page-sub">还原舆情传播路径与关键节· <span class="pill pill-blue">规划模块</span></p>
        </div>
        <div class="actions">
          <select class="select" id="pEvent" style="min-width:240px">${opts}</select>
        </div>
      </div>

      <div class="card card-pad-lg" style="margin-bottom:18px">
        <div class="ai-text" style="color:var(--text-2)">${esc(data.summary)}</div>
      </div>

      <div class="card card-pad-lg">
        <div class="chart-head"><span class="section-title">传播路径</span><span class="muted" style="font-size:13px">还原舆情从起源到放大的完整链</span></div>
        <div class="net-wrap">${propagationNetworkSVG(data.platforms, data.nodes)}</div>
        <div class="net-caption"><span class="net-arrow"></span> 传播方向：舆情起多平台扩关键节点放大</div>
      </div>

      <div class="prop-grid-2" style="margin-top:18px">
        <div class="card card-pad-lg">
          <div class="chart-head"><span class="section-title">关键传播节点</span></div>
          <div style="margin-top:12px">${nodeHTML}</div>
        </div>
        <div class="card card-pad-lg">
          <div class="chart-head"><span class="section-title">平台分布</span><span class="muted" style="font-size:13px">单位：条</span></div>
          <div class="kw-list" style="margin-top:14px">${platHTML}</div>
        </div>
      </div>

      <div class="card card-pad-lg" style="margin-top:18px">
        <div class="chart-head"><span class="section-title">传播时间</span></div>
        <div class="timeline" style="margin-top:16px">${tlHTML}</div>
      </div>`;

    $app.innerHTML = shell("#/propagation", inner);
    bindShell();

    document.getElementById("pEvent").addEventListener("change", (e) => { propState.eventId = Number(e.target.value); renderPropagation(); });
  }

  /* ----------------------------- 路由 ----------------------------- */
  function route() {
    const hash = location.hash || "#/dashboard";
    const token = store.getItem("apple_proto_token");

    // 鉴权守卫（对应frontend router beforeEach）
    if (!token && hash !== "#/login") { location.hash = "#/login"; return; }
    if (token && hash === "#/login") { location.hash = "#/dashboard"; return; }

    const m = hash.match(/^#\/opinion\/(.+)$/);
    if (hash === "#/login") return renderLogin();
    if (hash === "#/dashboard") return renderDashboard();
    if (hash === "#/opinions") return renderOpinions();
    if (m) return renderOpinionDetail(m[1]);
    if (hash === "#/events") return renderEvents();
    if (hash === "#/alerts") return renderAlerts();
    if (hash === "#/propagation") return renderPropagation();

    // 默认
    location.hash = token ? "#/dashboard" : "#/login";
  }

  window.addEventListener("hashchange", route);
  // 首屏：无 hash 时给个默认值
  if (!location.hash) location.hash = "#/dashboard";
  route();
})();
</script>
</body>
</html>
